services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recru-backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - redis
    networks:
      - recru-network

  nginx:
    image: nginx:1.27-alpine
    container_name: recru-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - recru-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recru-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - recru-network

  redis:
    image: redis:7-alpine
    container_name: recru-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - recru-network

volumes:
  redis_data:
  frontend_node_modules:

networks:
  recru-network:
    driver: bridge